<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>BMI Calculator - HUH?</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,700" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #1a1a1a; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #eee;
        }
        .container { width: 90%; max-width: 400px; }
        .panel {
            background: #2d2d2d;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #444;
        }
        h2 { color: #fff; margin-bottom: 5px; letter-spacing: 1px; }
        #introText { color: #aaa; font-size: 0.85rem; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group p { margin: 0 0 8px 0; font-weight: bold; font-size: 0.8rem; color: #bbb; text-transform: uppercase; }
        
        input[type="number"] {
            width: 100%;
            padding: 15px;
            background: #3d3d3d;
            border: 2px solid #444;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1.1rem;
            color: #fff;
            outline: none;
            transition: all 0.3s;
        }
        input[type="number"]:focus { border-color: #00d2ff; background: #444; }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s, box-shadow 0.3s;
        }
        .btn:hover { box-shadow: 0 5px 15px rgba(0,210,255,0.4); }
        .btn:active { transform: scale(0.96); }

        
        #results {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            background: #333;
            display: none; 
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bmi-value { font-size: 3rem; font-weight: 800; margin: 5px 0; }
        .status-text { font-size: 1.2rem; margin-bottom: 10px; font-weight: bold; }
        .meme-emoji { font-size: 4rem; margin: 15px 0; display: block; }
        
       
        .color-low { color: #57cc99; }
        .color-good { color: #80ffdb; }
        .color-warn { color: #ffca3a; }
        .color-danger { color: #ff595e; }

        .error { color: #ff595e; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="panel">
            <h2>WHAT'S YOUR BMI? <span style="color:#00d2ff">HUH?</span></h2>
            <p id="introText">別害羞，輸入你的體重和身高...</p>
            
            <form id="bmiForm">
                <div class="input-group">
                    <p>Weight (KG)</p>
                    <input id="weight" type="number" step="0.1" placeholder="例如: 65" required />
                </div>
                <div class="input-group">
                    <p>Height (CM)</p>
                    <input id="height" type="number" step="0.1" placeholder="例如: 175" required /> 
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate Now</button>
            </form>

            <div id="results"></div>
            <div id="errorMsg" class="error"></div>
        </div>
    </div>

    <script>
        function calculate() {
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const resultsDiv = document.getElementById('results');
            const errorDiv = document.getElementById('errorMsg');

            errorDiv.innerHTML = "";
            resultsDiv.style.display = "none";

            if (!weight || !height || weight <= 0 || height <= 0) {
                errorDiv.innerHTML = "嘿！數字不對吧？你是空氣做的嗎？";
                return;
            }

            const heightInMeters = height / 100;
            const bmi = (weight / (heightInMeters * heightInMeters)).toFixed(1);
            
            let status = "";
            let message = "";
            let colorClass = "";
            let emoji = "";

            if (bmi < 18.5) {
                status = "皮包骨";
                message = "你是紙片人嗎？沒事多吃點肉，別被風吹跑了！";
                colorClass = "color-low";
                emoji = "💀";
            } else if (bmi < 24) {
                status = "正常人";
                message = "切，竟然在標準範圍內... 無法嘲諷你，真沒意思。";
                colorClass = "color-good";
                emoji = "😎";
            } else if (bmi < 27) {
                status = "福氣滿滿";
                message = "開始橫向發展了喔！你的褲子還好嗎？";
                colorClass = "color-warn";
                emoji = "🍕";
            } else if (bmi < 30) {
                status = "輕度肥胖";
                message = "這不是胖，這是地心引力對你特別熱情！";
                colorClass = "color-danger";
                emoji = "🍔";
            } else {
                status = "重量級巨星";
                message = "你這已經不是過重了，是整個人類文明的負擔。";
                colorClass = "color-danger";
                emoji = "🐳";
            }

            resultsDiv.style.display = "block";
            resultsDiv.innerHTML = `
                <div class="${colorClass}">
                    <div class="status-text">判定結果：${status}</div>
                    <div class="bmi-value">${bmi}</div>
                    <span class="meme-emoji">${emoji}</span>
                    <p style="color: #aaa; font-style: italic;">"${message}"</p>
                </div>
            `;
        }

       
        document.getElementById('bmiForm').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') calculate();
        });
    </script>
</body>
</html>
